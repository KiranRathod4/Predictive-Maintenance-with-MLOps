global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  # ── Live API on Render ────────────────────────────────────────────────────
  # Scrapes /metrics from your deployed FastAPI every 15s
  # This is what makes Grafana graphs fluctuate when predictions are made
  - job_name: "predictive-maintenance"
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - "predictive-maintenance-with-mlops-1.onrender.com"
    scrape_interval: 15s
    scrape_timeout: 10s
