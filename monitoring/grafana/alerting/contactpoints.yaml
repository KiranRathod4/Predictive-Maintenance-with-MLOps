apiVersion: 1

contactPoints:
  - orgId: 1
    name: Gmail Alerts
    receivers:
      - uid: gmail-email-receiver
        type: email
        disableResolveMessage: false
        settings:
          addresses: kiranrathod4299@gmail.com
          subject: >-
            [CRITICAL] Predictive Maintenance Alert — Low RUL Detected
          message: |
            ⚠️  CRITICAL ENGINE ALERT

            An aircraft engine has been detected with a critically low
            Remaining Useful Life (RUL ≤ 30 cycles).

            Immediate maintenance scheduling is required.

            ─────────────────────────────────────────
            Alert   : {{ .CommonLabels.alertname }}
            Severity: {{ .CommonLabels.severity }}
            Status  : {{ .Status | toUpper }}
            Time    : {{ .Alerts.Firing | len }} alert(s) firing
            ─────────────────────────────────────────

            Action Required:
            1. Open Grafana dashboard → http://localhost:3000
            2. Identify the engine with low RUL on the prediction graph
            3. Schedule maintenance before the next operational cycle

            — Predictive Maintenance MLOps System
