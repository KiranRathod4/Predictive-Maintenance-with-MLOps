services:

  # ── MLflow Tracking Server ──────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
    restart: unless-stopped
  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/alerting:/etc/grafana/provisioning/alerting
    environment:
      # ── Admin login ──────────────────────────────────────────────────────
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false

      # ── Gmail SMTP for email alerts ──────────────────────────────────────
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=kiranrathod4299@gmail.com
      - GF_SMTP_PASSWORD=kqdxrtslionqxvay
      - GF_SMTP_FROM_ADDRESS=kiranrathod4299@gmail.com
      - GF_SMTP_FROM_NAME=Predictive Maintenance Alert
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS

      # ── Alerting ─────────────────────────────────────────────────────────
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false

    restart: unless-stopped
    depends_on:
      - prometheus

# ── Persistent volumes ──────────────────────────────────────────────────────
volumes:
  mlflow_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Network ─────────────────────────────────────────────────────────────────
networks:
  default:
    name: mlops-network
    driver: bridge